<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MICSA Cotizador PRO 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f6fa;--surface:#ffffff;--surface2:#f0f1f5;--surface3:#e8eaef;--border:#b0b5c0;--text:#0a0c10;--muted:#3d4350;--accent:#0066ff;--accent2:#c58a00;--green:#15803d;--red:#dc2626;--blue:#2563eb;--purple:#7c3aed;--radius:10px}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
.app{max-width:1200px;margin:0 auto;padding:0 20px 60px}
.header{border-bottom:1px solid var(--border);padding:24px 0 20px;margin-bottom:32px;display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:12px}
.header-brand{display:flex;align-items:center;gap:16px}
.header-logo{width:44px;height:44px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:22px;color:white;letter-spacing:1px}
.header-title{font-family:'Barlow Condensed',sans-serif;font-size:28px;letter-spacing:3px;line-height:1}
.header-sub{font-size:12px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.tabs{display:flex;gap:4px;margin-bottom:28px;background:var(--surface);padding:4px;border-radius:var(--radius);width:fit-content;border:1px solid var(--border)}
.tab{padding:8px 20px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text);border:none;background:none;transition:all .2s;font-family:inherit}
.tab.active{background:var(--accent);color:white}
.tab:hover:not(.active){color:var(--text)}
.steps{display:flex;gap:0;margin-bottom:32px;flex-wrap:wrap}
.step-item{display:flex;align-items:center;gap:8px;cursor:pointer}
.step-item+.step-item::before{content:'\2192';color:var(--border);margin:0 6px;font-size:16px}
.step-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.step-item.active .step-num{background:var(--accent);color:white;border-color:var(--accent)}
.step-item.done .step-num{background:var(--green);color:white;border-color:var(--green)}
.step-label{font-size:12px;color:var(--muted)}
.step-item.active .step-label,.step-item.done .step-label{color:var(--text)}
.section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:20px}
.section-title{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:18px;display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}
.field-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
.field{display:flex;flex-direction:column;gap:6px}
.field.full{grid-column:1/-1}
.field label{font-size:12px;color:var(--muted);font-weight:500}
.field input,.field select,.field textarea{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:9px 12px;color:var(--text);font-family:inherit;font-size:14px;outline:none;transition:border .2s}
.field textarea{min-height:80px;resize:vertical}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
.field select option{background:var(--surface2)}
.toggle-row{display:flex;align-items:center;gap:10px;margin-top:8px}
.toggle{width:40px;height:22px;background:var(--border);border-radius:11px;position:relative;cursor:pointer;transition:background .2s}
.toggle.on{background:var(--green)}
.toggle::after{content:'';position:absolute;width:16px;height:16px;background:white;border-radius:50%;top:3px;left:3px;transition:left .2s}
.toggle.on::after{left:21px}
.ptable{width:100%;border-collapse:collapse}
.ptable th{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);padding:8px 10px;text-align:left;border-bottom:1px solid var(--border)}
.ptable td{padding:8px 10px;border-bottom:1px solid var(--border)}
.ptable tr:last-child td{border-bottom:none}
.ptable input,.ptable select{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--text);font-family:inherit;font-size:13px;width:100%;outline:none}
.ptable input:focus,.ptable select:focus{border-color:var(--accent)}
.cost-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.cost-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:16px}
.cost-card-title{font-size:12px;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.cost-card-val{font-family:'DM Mono',monospace;font-size:16px;color:var(--text)}
.cost-card-note{font-size:11px;color:var(--muted);margin-top:4px}
.cost-card input{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 10px;color:var(--text);font-family:inherit;font-size:14px;width:100%;outline:none;margin-top:6px}
.cost-card input:focus{border-color:var(--accent)}
.btn{padding:10px 22px;border-radius:8px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;border:2px solid transparent;transition:all .2s}
.btn-primary{background:var(--accent);color:white;border-color:var(--accent)}
.btn-primary:hover{background:#c43d14;border-color:#c43d14}
.btn-secondary{background:var(--surface);color:var(--text);border:2px solid var(--border)}
.btn-secondary:hover{border-color:var(--text)}
.btn-ghost{background:transparent;color:var(--text);border:2px solid var(--border)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-green{background:var(--green);color:white;font-weight:700;border-color:var(--green)}
.btn-green:hover{background:#166534;border-color:#166534}
.btn-row{display:flex;gap:10px;margin-top:24px;flex-wrap:wrap}
.btn-add{background:var(--surface);border:2px dashed var(--border);color:var(--text);padding:8px 16px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:500;font-family:inherit;width:100%;margin-top:12px;transition:all .2s}
.btn-add:hover{border-color:var(--accent);color:var(--accent)}
.btn-del{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:2px 6px;border-radius:4px}
.btn-del:hover{color:var(--red);background:#fee2e2}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:800px){.summary-grid{grid-template-columns:1fr}}
.cost-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.cost-row:last-child{border-bottom:none}
.cost-label{font-size:13px;color:var(--muted)}
.cost-val{font-family:'DM Mono',monospace;font-size:13px}
.cost-row.subtotal{border-top:2px solid var(--border);margin-top:4px;padding-top:10px}
.cost-row.subtotal .cost-label{color:var(--text);font-weight:500}
.cost-row.subtotal .cost-val{color:var(--text);font-weight:600}
.cost-row.total{background:var(--accent);margin:12px -24px -24px;padding:16px 24px;border-radius:0 0 var(--radius) var(--radius);border:none}
.cost-row.total .cost-label{font-size:16px;font-weight:700;color:white}
.cost-row.total .cost-val{font-size:20px;color:white;font-weight:700}
.cost-row.iva-row{background:var(--surface2);margin:4px -24px;padding:10px 24px;border:none}
.cost-row.iva-row .cost-label{color:var(--blue);font-weight:500}
.cost-row.iva-row .cost-val{color:var(--blue);font-weight:600}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px 16px}
.kpi-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.kpi-val{font-family:'Barlow Condensed',sans-serif;font-size:24px;letter-spacing:1px;margin-top:4px}
.alcance-item{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:12px 16px;margin-bottom:8px;display:flex;gap:12px;align-items:flex-start}
.alcance-letter{font-family:'Barlow Condensed',sans-serif;font-size:18px;color:var(--accent);min-width:24px}
.alcance-text{font-size:13px;line-height:1.5;flex:1}
.alcance-text textarea{background:transparent;border:none;color:var(--text);font-family:inherit;font-size:13px;width:100%;outline:none;resize:none;line-height:1.5;min-height:40px}
.etapa-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:16px}
.etapa-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.etapa-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;letter-spacing:2px;color:var(--accent2)}
.mono{font-family:'DM Mono',monospace}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.iva-tag{display:inline-block;padding:2px 6px;border-radius:3px;font-size:10px;font-weight:600;background:#dbeafe;color:var(--blue);margin-left:6px}
.eq-row{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:8px}
.eq-row-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.eq-row-fields{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr auto;gap:8px;align-items:end}
@media(max-width:700px){.eq-row-fields{grid-template-columns:1fr 1fr;}}
.eq-row-fields .field{gap:4px}
.eq-row-fields .field label{font-size:11px}
.eq-row-fields .field input,.eq-row-fields .field select{padding:7px 10px;font-size:13px}
.eq-ref{font-size:11px;color:var(--blue);margin-top:6px;font-style:italic}
.preset-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin-bottom:16px}
.preset-btn{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:10px 12px;cursor:pointer;text-align:left;transition:all .15s;font-family:inherit}
.preset-btn:hover{border-color:var(--accent);background:#fff5f0}
.preset-btn .pname{font-size:13px;font-weight:500;color:var(--text)}
.preset-btn .pprice{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px}
.hist-table{width:100%;border-collapse:collapse}
.hist-table th{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);padding:10px 14px;text-align:left;border-bottom:1px solid var(--border)}
.hist-table td{padding:12px 14px;border-bottom:1px solid var(--border);font-size:14px}
.hist-table tr:last-child td{border-bottom:none}
.hist-table tr:hover td{background:var(--surface2)}
.toast{position:fixed;bottom:24px;right:24px;background:var(--green);color:white;padding:12px 20px;border-radius:8px;font-weight:600;font-size:14px;z-index:999;animation:slideup .3s ease}
@keyframes slideup{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.detail-row{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);padding:3px 0}
.detail-row span:last-child{font-family:'DM Mono',monospace}
.prorrateo-tag{display:inline-block;padding:2px 6px;border-radius:3px;font-size:10px;font-weight:600;background:#fef3c7;color:#92400e;margin-left:6px}
/* Print: formal quote only */
@media print{.no-print{display:none!important}body{background:white;color:#111}.app{padding:0 20px}.section{border:1px solid #ccc;background:white}.print-header{display:block!important}.formal-print{display:block!important}.cot-topbar{display:none!important}#gpt_sidebar_main_container,#icon_id_gpt_icon_id,#claude-static-indicator-container,[id*="gpt_sidebar"],[class*="gpt_sidebar"]{display:none!important}}
.print-header{display:none}
.formal-print{display:none}
/* Formal quote styles */
.formal-cot{font-family:'DM Sans',sans-serif;color:#111;max-width:900px;margin:0 auto}
.formal-cot h2{font-family:'Barlow Condensed',sans-serif;font-size:22px;letter-spacing:2px;text-align:center;margin:24px 0 16px}
.formal-cot .fc-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;padding-bottom:12px;border-bottom:2px solid #111}
.formal-cot .fc-logo{font-family:'Barlow Condensed',sans-serif;font-size:36px;letter-spacing:3px}
.formal-cot .fc-info{text-align:right;font-size:12px;line-height:1.6}
.formal-cot .fc-table{width:100%;border-collapse:collapse;margin-bottom:20px;font-size:13px}
.formal-cot .fc-table td{padding:6px 12px;border:1px solid #888}
.formal-cot .fc-table .fc-label{font-weight:600;background:#f0f0f0;width:120px}
.formal-cot .fc-alcance{font-size:12px;line-height:1.6;margin-bottom:8px;text-align:justify}
.formal-cot .fc-price-table{width:100%;border-collapse:collapse;margin:16px 0;font-size:13px}
.formal-cot .fc-price-table th,.formal-cot .fc-price-table td{padding:10px 14px;border:1px solid #888}
.formal-cot .fc-price-table th{background:#e0e0e0;font-weight:700;text-transform:uppercase;font-size:11px;letter-spacing:1px}
.formal-cot .fc-price-amount{font-size:14px;font-weight:700;text-align:center}
.formal-cot .fc-includes{font-size:12px;line-height:1.8}
.formal-cot .fc-nota{font-size:11px;line-height:1.5;color:#333;margin-top:16px}
.formal-cot .fc-footer{font-size:11px;color:#555;border-top:1px solid #888;padding-top:12px;margin-top:24px;text-align:center}

/* Ã¢ÂÂÃ¢ÂÂÃ¢ÂÂ CotizaciÃÂ³n Generator Side-by-Side Ã¢ÂÂÃ¢ÂÂÃ¢ÂÂ */
.cot-gen{display:grid;grid-template-columns:1fr 1fr;gap:0;min-height:100vh;font-family:'DM Sans',sans-serif}
@media(max-width:1000px){.cot-gen{grid-template-columns:1fr}}
.cot-editor{padding:24px 28px;overflow-y:auto;max-height:100vh;background:var(--bg)}
.cot-preview{background:#e8e8e8;padding:20px;overflow-y:auto;max-height:100vh;position:sticky;top:0}
.cot-preview-inner{background:white;max-width:680px;margin:0 auto;padding:48px 52px;box-shadow:0 2px 20px rgba(0,0,0,0.12);font-size:11px;line-height:1.5;color:#111;min-height:900px}
.cot-section-header{background:var(--accent);color:white;padding:8px 14px;font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:1px;margin:20px 0 12px;border-radius:4px}
.cot-section-header.green{background:#15803d}
.cot-section-header.red{background:#dc2626}
.cot-section-header.blue{background:#1e40af}
.cot-field{margin-bottom:14px}
.cot-field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:600;margin-bottom:4px}
.cot-field input,.cot-field textarea{width:100%;background:white;border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-family:inherit;font-size:13px;color:var(--text);outline:none;transition:border .2s}
.cot-field input:focus,.cot-field textarea:focus{border-color:var(--accent)}
.cot-field textarea{min-height:70px;resize:vertical}
.cot-field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.cot-item-row{display:flex;gap:8px;align-items:flex-start;margin-bottom:8px}
.cot-item-letter{min-width:24px;font-weight:700;font-size:13px;color:var(--accent);padding-top:8px}
.cot-item-input{flex:1}
.cot-item-input textarea{width:100%;background:white;border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-family:inherit;font-size:12px;color:var(--text);outline:none;resize:none;min-height:38px}
.cot-item-del{background:transparent;border:none;color:#dc2626;font-size:18px;cursor:pointer;padding:6px;border-radius:4px;line-height:1}
.cot-item-del:hover{background:#fee2e2}
.cot-btn-row{display:flex;gap:8px;margin-top:8px}
.cot-btn-sm{padding:6px 14px;border-radius:5px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:white;color:var(--text);font-family:inherit;transition:all .15s}
.cot-btn-sm:hover{border-color:var(--accent);color:var(--accent)}
.cot-topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.cot-topbar-title{font-size:18px;font-weight:700;color:var(--text)}
.cot-topbar-back{display:flex;align-items:center;gap:6px;cursor:pointer;color:var(--muted);font-size:13px;font-weight:500;background:none;border:none;font-family:inherit}
.cot-topbar-back:hover{color:var(--accent)}
.cot-preview-toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.cot-preview-label{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);font-weight:600}
.cot-print-btn{background:var(--accent);color:white;border:none;padding:10px 20px;border-radius:6px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:1px}
.cot-print-btn:hover{background:#c43d14}
/* Preview doc styles */
.pv-header{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid #111;padding-bottom:10px;margin-bottom:16px}
.pv-logo{font-family:'Barlow Condensed',sans-serif;font-size:32px;letter-spacing:3px;color:#0066ff}
.pv-slogan{font-size:8px;color:#555;max-width:140px;line-height:1.3;margin-top:2px}
.pv-info{text-align:right;font-size:9px;line-height:1.5;color:#333}
.pv-table{width:100%;border-collapse:collapse;margin-bottom:14px}
.pv-table td{padding:4px 8px;border:1px solid #999;font-size:10px;font-weight:600}
.pv-table .pv-label{font-weight:700;background:#f0f0f0;width:80px}
.pv-section-title{font-weight:700;text-align:center;margin:16px 0 10px;font-size:12px;letter-spacing:1px}
.pv-alcance{font-size:10px;line-height:1.5;margin-bottom:4px;text-align:justify;font-weight:600}
.pv-price-table{width:100%;border-collapse:collapse;margin:12px 0}
.pv-price-table th{background:#d0d0d0;padding:6px 8px;font-size:9px;text-transform:uppercase;letter-spacing:1px;border:1px solid #999;font-weight:700}
.pv-price-table td{padding:8px;border:1px solid #999;font-size:10px;font-weight:600}
.pv-price-amount{font-weight:700;text-align:center;font-size:11px}
.pv-nota{font-size:6px;line-height:1.1;color:#bbb;margin-bottom:2px;text-align:justify;font-weight:400}
.pv-footer{border-top:3px solid #0066ff;background:#0066ff;color:white;padding:8px 12px;font-size:8px;margin-top:20px;text-align:center;line-height:1.5}

.pv-watermark>*{position:relative;z-index:1}

.db-container{padding:20px 0}
.db-tabs{display:flex;gap:6px;margin-bottom:20px;border-bottom:2px solid var(--border);padding-bottom:12px}
.db-tab{padding:8px 16px;border-radius:6px 6px 0 0;border:1px solid var(--border);background:var(--surface2);cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);transition:all 0.2s}
.db-tab.active{background:var(--accent);color:white;border-color:var(--accent)}
.db-tab:hover:not(.active){background:var(--surface);color:var(--text)}
.db-items-grid{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.db-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--surface2);border-radius:8px;border:1px solid var(--border);gap:8px}
.db-item-info{flex:1;min-width:0}
.db-item-name{font-weight:600;font-size:14px;color:var(--text)}
.db-item-meta{font-size:11px;color:var(--muted);margin-top:2px}
.db-item-price{font-size:13px;font-weight:700;color:var(--blue);white-space:nowrap}
.db-item-actions{display:flex;gap:6px;flex-shrink:0}
.db-add-btn{padding:5px 10px;background:var(--accent);color:white;border:none;border-radius:5px;cursor:pointer;font-size:12px;font-weight:600}
.db-del-btn{padding:5px 8px;background:#fee2e2;color:#dc2626;border:none;border-radius:5px;cursor:pointer;font-size:12px;font-weight:600}
.db-form{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:20px}
.db-form-title{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px}
.db-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.db-form-full{grid-column:1/-1}
.db-upload-area{border:2px dashed var(--accent);border-radius:10px;padding:20px;text-align:center;cursor:pointer;margin-bottom:20px;transition:all 0.2s;background:var(--surface2)}
.db-upload-area:hover{background:rgba(99,102,241,0.08)}
.db-upload-icon{font-size:32px;margin-bottom:8px}
.db-upload-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px}
.db-upload-sub{font-size:12px;color:var(--muted)}
.db-parse-result{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:16px;max-height:200px;overflow-y:auto;font-size:12px;font-family:monospace;color:var(--muted)}
.db-empty{text-align:center;padding:32px;color:var(--muted);font-size:14px}
.db-source-badge{display:inline-block;padding:2px 6px;background:rgba(99,102,241,0.12);color:var(--accent);border-radius:4px;font-size:10px;font-weight:600}
.db-preset-btn{border:1px solid var(--accent)!important;background:rgba(99,102,241,0.06)!important}
.db-preset-btn:hover{background:rgba(99,102,241,0.15)!important}
</style>

// CÃÂ¡lculo costo semanal por persona (calibrado FORZA STEEL)
function calcCostoPersonaSem(pago_semanal) {
  const imss_patronal = pago_semanal * 0.14369;
  const infonavit = pago_semanal * 0.02396;
  const aguinaldo_prov = pago_semanal * 0.02875;
  const vacaciones_prov = pago_semanal * 0.03833;
  const riesgo_trabajo = pago_semanal * 0.01246;
  const isn = pago_semanal * 0.01437;
  const admin = P.ADMIN_PERSONA_SEM;
  const cargas = imss_patronal + infonavit + aguinaldo_prov + vacaciones_prov + riesgo_trabajo + isn + admin;
  const total = pago_semanal + cargas;
  return {
    pago_semanal,
    imss_patronal: Math.round(imss_patronal * 100) / 100,
    infonavit: Math.round(infonavit * 100) / 100,
    aguinaldo_prov: Math.round(aguinaldo_prov * 100) / 100,
    vacaciones_prov: Math.round(vacaciones_prov * 100) / 100,
    riesgo_trabajo: Math.round(riesgo_trabajo * 100) / 100,
    isn: Math.round(isn * 100) / 100,
    admin,
    cargas: Math.round(cargas * 100) / 100,
    total: Math.round(total * 100) / 100,
  };
}

function equipoSemanalMXN(eq) {
  let base = eq.precio;
  if (eq.moneda === "USD") base = base * P.USD_MXN;
  if (eq.periodo === "dia") return base * 7;
  if (eq.periodo === "mes") return base / 4.33;
  return base;
}

// Convertir nÃÂºmero a texto en espaÃÂ±ol para cotizaciÃÂ³n formal
function numATexto(n, moneda) {
  const entero = Math.floor(n);
  const centavos = Math.round((n - entero) * 100);
  const unidades = ["","UN","DOS","TRES","CUATRO","CINCO","SEIS","SIETE","OCHO","NUEVE"];
  const especiales = ["DIEZ","ONCE","DOCE","TRECE","CATORCE","QUINCE"];
  const decenas = ["","","VEINT","TREINT","CUARENT","CINCUENT","SESENT","SETENT","OCHENT","NOVENT"];
  const centenas = ["","CIENTO","DOSCIENTOS","TRESCIENTOS","CUATROCIENTOS","QUINIENTOS","SEISCIENTOS","SETECIENTOS","OCHOCIENTOS","NOVECIENTOS"];

  function grupoTres(n) {
    if (n === 0) return "";
    if (n === 100) return "CIEN";
    let r = "";
    const c = Math.floor(n / 100);
    const d = Math.floor((n % 100) / 10);
    const u = n % 10;
    if (c > 0) r += centenas[c] + " ";
    const du = n % 100;
    if (du >= 10 && du <= 15) { r += especiales[du - 10]; return r.trim(); }
    if (du >= 16 && du <= 19) { r += "DIECI" + unidades[u]; return r.trim(); }
    if (du >= 20 && du <= 29 && du !== 20) { r += "VEINTI" + unidades[u]; return r.trim(); }
    if (du === 20) { r += "VEINTE"; return r.trim(); }
    if (d > 0) { r += decenas[d] + "A"; if (u > 0) r += " Y "; }
    if (u > 0) r += unidades[u];
    return r.trim();
  }

  if (entero === 0) return "CERO " + (centavos < 10 ? "0" : "") + centavos + "/100 " + moneda;
  let texto = "";
  const millones = Math.floor(entero / 1000000);
  const miles = Math.floor((entero % 1000000) / 1000);
  const resto = entero % 1000;
  if (millones > 0) {
    texto += (millones === 1 ? "UN MILLON " : grupoTres(millones) + " MILLONES ");
  }
  if (miles > 0) {
    texto += (miles === 1 ? "MIL " : grupoTres(miles) + " MIL ");
  }
  if (resto > 0) texto += grupoTres(resto) + " ";
  texto += (centavos < 10 ? "0" : "") + centavos + "/100 " + moneda;
  return texto.trim();
}

// Sistema de Login
const USERS = [
  { usuario: 'admin', contrasena: 'micsa2026', rol: 'Admin' },
  { usuario: 'jordan', contrasena: 'micsa2026', rol: 'Admin' },
  { usuario: 'rodolfo', contrasena: 'rodolfo2026', rol: 'Admin' },
  { usuario: 'invitado', contrasena: 'micsa', rol: 'Solo lectura' }
];

function LoginScreen({ onLogin }) {
  const [usuario, setUsuario] = React.useState('');
  const [contrasena, setContrasena] = React.useState('');
  const [error, setError] = React.useState('');
  const [loading, setLoading] = React.useState(false);

  const handleLogin = (e) => {
    e.preventDefault();
    setLoading(true);
    setError('');
    setTimeout(() => {
      const user = USERS.find(u => u.usuario === usuario && u.contrasena === contrasena);
      if (user) {
        onLogin(user);
      } else {
        setError('Usuario o contraseÃÂ±a incorrectos');
        setLoading(false);
      }
    }, 500);
  };

  return React.createElement('div', {
    style: {
      minHeight: '100vh',
      display: 'flex',
      alignItems: 'center',
      justifyContent: 'center',
      background: 'linear-gradient(135deg, #f5f6fa 0%, #e8eaf6 100%)',
      fontFamily: 'DM Sans, sans-serif'
    }
  },
    React.createElement('div', {
      style: {
        background: '#fff',
        borderRadius: '18px',
        boxShadow: '0 8px 32px rgba(0,0,0,0.12)',
        padding: '48px 40px',
        width: '100%',
        maxWidth: '400px',
        textAlign: 'center'
      }
    },
      React.createElement('div', { style: { marginBottom: '32px' } },
        React.createElement('div', {
          style: {
            fontSize: '32px',
            fontWeight: '800',
            color: '#1a1a2e',
            marginBottom: '8px'
          }
        }, 'MICSA'),
        React.createElement('div', {
          style: {
            fontSize: '14px',
            color: '#666',
            fontWeight: '500'
          }
        }, 'Cotizador PRO 2026')
      ),
      React.createElement('form', { onSubmit: handleLogin },
        React.createElement('div', { style: { marginBottom: '16px', textAlign: 'left' } },
          React.createElement('label', {
            style: { display: 'block', fontSize: '13px', fontWeight: '600', color: '#333', marginBottom: '6px' }
          }, 'Usuario'),
          React.createElement('input', {
            type: 'text',
            value: usuario,
            onChange: e => setUsuario(e.target.value),
            placeholder: 'Ingresa tu usuario',
            required: true,
            style: {
              width: '100%',
              padding: '12px 16px',
              borderRadius: '10px',
              border: '2px solid #e0e0e0',
              fontSize: '14px',
              outline: 'none',
              boxSizing: 'border-box',
              transition: 'border-color 0.2s'
            }
          })
        ),
        React.createElement('div', { style: { marginBottom: '24px', textAlign: 'left' } },
          React.createElement('label', {
            style: { display: 'block', fontSize: '13px', fontWeight: '600', color: '#333', marginBottom: '6px' }
          }, 'Contrase\u00f1a'),
          React.createElement('input', {
            type: 'password',
            value: contrasena,
            onChange: e => setContrasena(e.target.value),
            placeholder: 'Ingresa tu contrase\u00f1a',
            required: true,
            style: {
              width: '100%',
              padding: '12px 16px',
              borderRadius: '10px',
              border: '2px solid #e0e0e0',
              fontSize: '14px',
              outline: 'none',
              boxSizing: 'border-box'
            }
          })
        ),
        error && React.createElement('div', {
          style: {
            background: '#fff0f0',

          }
        }, error),
        React.createElement('button', {
          type: 'submit',

            color: '#fff',
            border: 'none',
            borderRadius: '10px',
            fontSize: '15px',
            fontWeight: '700',
            cursor: loading ? 'not-allowed' : 'pointer',

          }

      )

  );

function AppWithLogin() {
  const [user, setUser] = React.useState(null);
  if (!user) {
    return React.createElement(LoginScreen, { onLogin: setUser });
  }
  return React.createElement(App, { onLogout: () => { if(window.confirm("\u00bfCerrar sesi\u00f3n?")) setUser(null); } });
}
